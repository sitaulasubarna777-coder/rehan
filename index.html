<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter: Drag & Strike</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', monospace; touch-action: none; 
        }
        canvas { 
            border: 2px solid #444; display: block; box-shadow: 0 0 40px rgba(0, 255, 255, 0.15); 
            background: radial-gradient(circle, #001 0%, #000 100%); max-width: 100vw; max-height: 100vh;
        }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 5; text-shadow: 0 0 10px #0ff; line-height: 1.4; }
        
        #restartBtn { 
            position: absolute; display: none; padding: 25px 50px; background: #f00; 
            color: #fff; border: 4px solid #fff; z-index: 10; font-weight: bold; 
            cursor: pointer; font-size: 24px; box-shadow: 0 0 30px #f00;
        }

        #mobileControls { 
            position: absolute; bottom: 30px; right: 30px; 
            display: flex; flex-direction: column; gap: 15px; pointer-events: none;
        }
        .m-btn { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid #0ff; 
            background: rgba(0,0,0,0.7); color: #0ff; font-weight: bold; 
            pointer-events: auto; font-size: 12px; backdrop-filter: blur(5px);
        }
        #ultraBtn { border-color: #ff0; color: #ff0; }
    </style>
</head>
<body>

    <div id="ui">
        SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span><br>
        ULTRA: <span id="ultraStatus">READY</span><br>
        <small>DRAG TO MOVE | TAP/CLICK TO FIRE</small>
    </div>

    <button id="restartBtn" onclick="init()">RESTART SYSTEM</button>

    <div id="mobileControls">
        <button class="m-btn" id="ultraBtn" onclick="fireNova()">ULTRA</button>
        <button class="m-btn" onclick="activateShield()">SHIELD</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const ultraEl = document.getElementById('ultraStatus');
const restartBtn = document.getElementById('restartBtn');

// --- PRO AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(type) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const now = audioCtx.currentTime;

    if(type === 'laser') {
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(880, now);
        o.frequency.exponentialRampToValueAtTime(110, now + 0.1);
        g.gain.setValueAtTime(0.1, now);
        o.start(); o.stop(now + 0.1);
    } else if(type === 'hit') {
        o.type = 'square';
        o.frequency.setValueAtTime(100, now);
        o.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        g.gain.setValueAtTime(0.1, now);
        o.start(); o.stop(now + 0.2);
    } else if(type === 'ultra') {
        o.type = 'triangle';
        o.frequency.setValueAtTime(40, now);
        o.frequency.exponentialRampToValueAtTime(600, now + 0.5);
        g.gain.setValueAtTime(0.2, now);
        o.start(); o.stop(now + 0.5);
    }
    o.connect(g); g.connect(audioCtx.destination);
}

function resize() {
    canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
    canvas.height = window.innerHeight > 600 ? 600 : window.innerHeight;
}
window.onresize = resize;
resize();

let player, bullets, enemies, score, wave, gameActive, isShieldActive, canShield, canUltra, spawnTimer;
const keys = {};

// --- DRAG CONTROLS ---
let isDragging = false;
canvas.addEventListener('pointerdown', (e) => {
    if(!gameActive) return;
    isDragging = true;
    if(e.pointerType === 'mouse' || e.target === canvas) fireBullet(player.angle);
});
window.addEventListener('pointermove', (e) => {
    if(!isDragging || !gameActive) return;
    const r = canvas.getBoundingClientRect();
    const tx = e.clientX - r.left;
    const ty = e.clientY - r.top;
    // Smooth follow
    player.x += (tx - player.x) * 0.2;
    player.y += (ty - player.y) * 0.2;
    // Angle ship toward movement
    player.angle = Math.atan2(ty - player.y, tx - player.x) || player.angle;
});
window.addEventListener('pointerup', () => isDragging = false);

function init() {
    player = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, accel: 0.6, friction: 0.94, angle: 0, radius: 22 };
    bullets = []; enemies = [];
    score = 0; wave = 1; gameActive = true; isShieldActive = false; canShield = true; canUltra = true;
    restartBtn.style.display = "none";
    ultraEl.innerText = "READY";
    if (spawnTimer) clearTimeout(spawnTimer);
    spawnEnemy();
    gameLoop();
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;
window.addEventListener('keydown', e => {
    if(e.code === 'Space') fireNova();
    if(e.code === 'KeyE') activateShield();
});

function fireBullet(ang) {
    bullets.push({ x: player.x, y: player.y, v: { x: Math.cos(ang) * 18, y: Math.sin(ang) * 18 } });
    playSFX('laser');
}

function fireNova() {
    if(!canUltra || !gameActive) return;
    canUltra = false; ultraEl.innerText = "CHARGING";
    playSFX('ultra');
    for(let i=0; i<36; i++) fireBullet((Math.PI*2/36)*i);
    setTimeout(() => { canUltra = true; ultraEl.innerText = "READY"; }, 8000);
}

function activateShield() {
    if(!canShield || !gameActive) return;
    canShield = false; isShieldActive = true;
    setTimeout(() => isShieldActive = false, 3500);
    setTimeout(() => canShield = true, 10000);
}

function spawnEnemy() {
    if(!gameActive) return;
    const side = Math.random() < 0.5;
    const x = side ? (Math.random() < 0.5 ? -20 : canvas.width + 20) : Math.random() * canvas.width;
    const y = side ? Math.random() * canvas.height : (Math.random() < 0.5 ? -20 : canvas.height + 20);
    enemies.push({ x, y, speed: 1.4 + (wave * 0.25) });
    spawnTimer = setTimeout(spawnEnemy, Math.max(200, 1400 - (wave * 120)));
}

function drawImprovedSpaceship() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    
    // Fuselage
    ctx.fillStyle = "#222";
    ctx.strokeStyle = "#0ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(28, 0);   // Sharp Nose
    ctx.lineTo(-8, 15);  // Wing R
    ctx.lineTo(-5, 0);   // Hull center
    ctx.lineTo(-8, -15); // Wing L
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Wing Tip Cannons
    ctx.strokeStyle = "#fff";
    ctx.strokeRect(-6, 12, 4, 6);
    ctx.strokeRect(-6, -18, 4, 6);

    // Triple Engine Array
    const flick = Math.random() * 8;
    ctx.fillStyle = isShieldActive ? "#f0f" : "#0ff";
    ctx.fillRect(-12, -2, 6+flick, 4); // Main engine
    ctx.globalAlpha = 0.6;
    ctx.fillRect(-10, 6, 4+flick, 3);  // Side engine R
    ctx.fillRect(-10, -9, 4+flick, 3); // Side engine L
    
    ctx.restore();
}

function gameLoop() {
    if (!gameActive) return;
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Keyboard movement support
    if (keys.KeyW || keys.ArrowUp) player.y -= 6;
    if (keys.KeyS || keys.ArrowDown) player.y += 6;
    if (keys.KeyA || keys.ArrowLeft) player.x -= 6;
    if (keys.KeyD || keys.ArrowRight) player.x += 6;

    // Boundaries
    player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

    if(isShieldActive) {
        ctx.strokeStyle = "#f0f"; ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.arc(player.x, player.y, 42, 0, 7); ctx.stroke();
        ctx.setLineDash([]);
    }

    drawImprovedSpaceship();

    bullets.forEach((b, i) => {
        b.x += b.v.x; b.y += b.v.y;
        ctx.fillStyle = "#0ff"; ctx.fillRect(b.x-1, b.y-1, 4, 4);
        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i, 1);
    });

    enemies.forEach((en, ei) => {
        const d = Math.hypot(player.x - en.x, player.y - en.y);
        en.x += (player.x - en.x)/d * en.speed;
        en.y += (player.y - en.y)/d * en.speed;
        
        ctx.strokeStyle = "#f00";
        ctx.beginPath(); ctx.moveTo(en.x, en.y-10); ctx.lineTo(en.x+10, en.y+10); ctx.lineTo(en.x-10, en.y+10); ctx.closePath(); ctx.stroke();

        if(d < 25 && !isShieldActive) { 
            gameActive = false; 
            restartBtn.style.display = "block"; 
            playSFX('hit');
        }

        bullets.forEach((b, bi) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 20) {
                enemies.splice(ei, 1); bullets.splice(bi, 1);
                score += 10; scoreEl.innerText = score;
                wave = Math.floor(score/300)+1; waveEl.innerText = wave;
                playSFX('hit');
            }
        });
    });

    requestAnimationFrame(gameLoop);
}
init();
</script>
</body>
</html>
