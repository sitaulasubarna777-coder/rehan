<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter: Ultra Edition</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', monospace; touch-action: none; 
        }
        canvas { 
            border: 3px solid #333; display: block; box-shadow: 0 0 30px #0ff; 
            background: #000; max-width: 100vw; max-height: 100vh;
        }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 5; text-shadow: 0 0 10px #0ff; }
        
        #restartBtn { 
            position: absolute; display: none; padding: 25px 50px; background: #f00; 
            color: #fff; border: 4px solid #fff; z-index: 10; font-weight: bold; 
            cursor: pointer; font-size: 24px; box-shadow: 0 0 20px #f00;
        }

        #mobileControls { 
            position: absolute; bottom: 30px; right: 30px; 
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        
        .m-btn { 
            width: 75px; height: 75px; border-radius: 50%; border: 2px solid #0ff; 
            background: rgba(0,0,0,0.6); color: #0ff; font-weight: bold; 
            pointer-events: auto; font-size: 10px; cursor: pointer;
        }
        #ultraBtn { border-color: #ff0; color: #ff0; background: rgba(255, 255, 0, 0.1); }
    </style>
</head>
<body>

    <div id="ui">
        SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span><br>
        ULTRA: <span id="ultraStatus">READY</span> [SPACE]<br>
        SHIELD [E] | FIRE [CLICK/F]
    </div>

    <button id="restartBtn" onclick="init()">RESTART SYSTEM</button>

    <div id="mobileControls">
        <button class="m-btn" id="ultraBtn" onclick="fireNova()">ULTRA</button>
        <button class="m-btn" onclick="activateShield()">SHIELD</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const ultraEl = document.getElementById('ultraStatus');
const restartBtn = document.getElementById('restartBtn');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playFX(f, t, d, vol=0.1) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function resize() {
    canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
    canvas.height = window.innerHeight > 600 ? 600 : window.innerHeight;
}
window.onresize = resize;
resize();

let player, bullets, enemies, score, wave, gameActive, isShieldActive, canShield, canUltra, spawnTimer;
const keys = {};

function init() {
    player = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, accel: 0.6, friction: 0.94, angle: 0, radius: 20 };
    bullets = []; enemies = [];
    score = 0; wave = 1; gameActive = true; isShieldActive = false; canShield = true; canUltra = true;
    restartBtn.style.display = "none";
    ultraEl.innerText = "READY";
    if (spawnTimer) clearTimeout(spawnTimer);
    spawnEnemy();
    gameLoop();
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

// Global Click/Tap to Fire
window.onmousedown = (e) => { 
    if(gameActive && e.target.tagName !== 'BUTTON') fireBullet(player.angle); 
};

window.addEventListener('keydown', e => {
    if(e.code === 'Space') fireNova();
    if(e.code === 'KeyE') activateShield();
    if(e.code === 'KeyF') fireBullet(player.angle);
});

// Mouse movement for aiming
window.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - r.top - player.y, e.clientX - r.left - player.x);
};

function fireBullet(ang) {
    bullets.push({ x: player.x, y: player.y, v: { x: Math.cos(ang) * 15, y: Math.sin(ang) * 15 } });
    playFX(450, 'sawtooth', 0.08);
}

function fireNova() {
    if(!canUltra || !gameActive) return;
    canUltra = false;
    ultraEl.innerText = "CHARGING";
    playFX(150, 'square', 0.5, 0.2);
    for(let i=0; i<32; i++) fireBullet((Math.PI*2/32)*i);
    setTimeout(() => { canUltra = true; ultraEl.innerText = "READY"; }, 7000);
}

function activateShield() {
    if(!canShield || !gameActive) return;
    canShield = false; isShieldActive = true;
    playFX(200, 'sine', 0.3);
    setTimeout(() => isShieldActive = false, 3000);
    setTimeout(() => canShield = true, 8000);
}

function spawnEnemy() {
    if(!gameActive) return;
    const x = Math.random() < 0.5 ? -20 : canvas.width + 20;
    const y = Math.random() * canvas.height;
    enemies.push({ x, y, speed: 1.5 + (wave * 0.2) });
    spawnTimer = setTimeout(spawnEnemy, Math.max(300, 1500 - (wave * 100)));
}

function drawRealSpaceship() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    
    // Fuselage (Body)
    ctx.fillStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(25, 0);   // Nose
    ctx.lineTo(-5, 12);  // Right wing root
    ctx.lineTo(-15, 12); // Right wing back
    ctx.lineTo(-10, 0);  // Tail center
    ctx.lineTo(-15, -12);// Left wing back
    ctx.lineTo(-5, -12); // Left wing root
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.stroke();

    // Cockpit
    ctx.fillStyle = "#0ff";
    ctx.beginPath();
    ctx.ellipse(5, 0, 8, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // Twin Engines Glow
    const flicker = Math.random() * 5;
    ctx.fillStyle = isShieldActive ? "#f0f" : "#f40";
    ctx.fillRect(-16, 4, 4 + flicker, 6); // Engine R
    ctx.fillRect(-16, -10, 4 + flicker, 6); // Engine L
    
    ctx.restore();
}

function gameLoop() {
    if (!gameActive) return;
    ctx.fillStyle = "rgba(0, 5, 15, 0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Keyboard Movement
    if (keys.KeyW || keys.ArrowUp) player.vy -= player.accel;
    if (keys.KeyS || keys.ArrowDown) player.vy += player.accel;
    if (keys.KeyA || keys.ArrowLeft) player.vx -= player.accel;
    if (keys.KeyD || keys.ArrowRight) player.vx += player.accel;
    
    player.vx *= player.friction; 
    player.vy *= player.friction;
    player.x += player.vx; 
    player.y += player.vy;

    // Bound Clamping (Keeps ship inside the box)
    if (player.x < player.radius) { player.x = player.radius; player.vx = 0; }
    if (player.x > canvas.width - player.radius) { player.x = canvas.width - player.radius; player.vx = 0; }
    if (player.y < player.radius) { player.y = player.radius; player.vy = 0; }
    if (player.y > canvas.height - player.radius) { player.y = canvas.height - player.radius; player.vy = 0; }

    if(isShieldActive) {
        ctx.strokeStyle = "#f0f"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(player.x, player.y, 40, 0, 7); ctx.stroke();
    }

    drawRealSpaceship();

    bullets.forEach((b, i) => {
        b.x += b.v.x; b.y += b.v.y;
        ctx.fillStyle = "#fff"; ctx.fillRect(b.x-1, b.y-1, 3, 3);
        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i, 1);
    });

    enemies.forEach((en, ei) => {
        const d = Math.hypot(player.x - en.x, player.y - en.y);
        en.x += (player.x - en.x)/d * en.speed;
        en.y += (player.y - en.y)/d * en.speed;
        ctx.strokeStyle = "#0ff"; ctx.strokeRect(en.x-10, en.y-10, 20, 20);

        if(d < 25 && !isShieldActive) { 
            gameActive = false; 
            restartBtn.style.display = "block"; 
            playFX(60, 'sawtooth', 0.4, 0.3);
        }

        bullets.forEach((b, bi) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 18) {
                enemies.splice(ei, 1); bullets.splice(bi, 1);
                score += 10; scoreEl.innerText = score;
                wave = Math.floor(score/200)+1; waveEl.innerText = wave;
                playFX(200, 'square', 0.1);
            }
        });
    });

    requestAnimationFrame(gameLoop);
}
init();
</script>
</body>
</html>
